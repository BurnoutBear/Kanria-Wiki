<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Wiki</title><!-- ← Change to your game name -->

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src  'self';
    style-src   'self' https://fonts.googleapis.com;
    font-src    https://fonts.gstatic.com;
    img-src     'self' data:;
    frame-src   'self';
    connect-src 'self';
    base-uri    'self';
    form-action 'none';
    object-src  'none';
  " />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <script src="coi-serviceworker.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <div class="page">

    <header class="page__header">
      <h1 class="page__title">Game Wiki</h1><!-- ← Change to your game name -->
      <p class="page__sub">Codex &amp; Compendium</p>
    </header>

    <div class="frame-wrap" id="frame-container">

      <div class="loader" id="loader" role="status" aria-live="polite">
        <div class="loader__ring" aria-hidden="true"></div>
        <p class="loader__text">Opening the tome…</p>
      </div>

      <div class="error-panel" id="error-panel" hidden aria-hidden="true" role="alert">
        <p class="error-panel__icon" aria-hidden="true">⚠</p>
        <p id="loader-message" class="error-panel__msg">Wiki export not found.</p>
        <p class="error-panel__hint">Export the Godot wiki to <code>wiki_export/</code> and push.</p>
      </div>

      <!--
        src set by main.js after load listener is attached.
        allow="fullscreen; pointer-lock" — minimum permissions for Godot.
        No sandbox: Godot needs same-origin for IndexedDB + SharedArrayBuffer.
      -->
      <iframe
        id="wiki-frame"
        aria-hidden="true"
        title="Game wiki"
        allow="fullscreen; pointer-lock"
        referrerpolicy="no-referrer"
        allowfullscreen
      ></iframe>

      <button
        id="fullscreen-btn"
        class="fullscreen-btn"
        title="Enter fullscreen"
        aria-label="Toggle fullscreen"
        aria-pressed="false"
      >
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
          <path d="M1 1h4M1 1v4M15 1h-4M15 1v4M1 15h4M1 15v-4M15 15h-4M15 15v-4"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

    </div>

    <footer class="page__footer">
      Built with Godot &amp; GitHub Pages ·
      <a href="https://github.com/YOUR_USERNAME/YOUR_WIKI_REPO"
         target="_blank" rel="noopener noreferrer">Source ↗</a>
    </footer>

  </div>

  <script src="assets/main.js"></script>
</body>
</html>
